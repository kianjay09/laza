name: flutter_application_1
description: "Laza E-commerce App with Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  
  # UI & Utilities
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/products/nike_air_max.jpg
    - assets/images/products/nike_air_jordan.jpg
    - assets/images/products/nike_air_force.jpg
    - assets/images/products/nike_air_max_97.jpg
    - assets/images/products/nike_revolution.jpg
    - assets/images/products/nike_tech_fleece.jpg
    - assets/images/products/nike_hoodie.jpg
    - assets/images/products/nike_windrunner.jpg
    - assets/images/products/watch.jpg
    - assets/images/products/headphones.jpg
    - assets/images/products/tshirt.jpg
    - assets/images/products/backpack.jpg
    - assets/images/products/coffee_maker.jpg